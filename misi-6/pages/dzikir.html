<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="loader-basepath" content="../">
    <title>Hitung Dzikir</title>
    <!-- TAILWIND CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- STYLES -->
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../styles/dzikir.css">
    <!-- FAVICON ICO -->
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <!-- FONTS -->
    <link href="https://fonts.cdnfonts.com/css/poppins" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/rabento-personal-use-only" rel="stylesheet">
    <!-- IMPORT FOR COMPONENTS -->
    <script src="../components/navbar.js" defer></script>
    <script src="../components/footer.js" defer></script>
    <script src="../components/loader.js" defer></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-[#F6F3E9] via-[#F8F5EE] to-[#F1ECE2] text-[#1F2937] font-sans">

    <!-- NAVBAR -->
    <site-navbar page="dzikir" basepath="../"></site-navbar>

    <!-- MAIN -->
    <main class="max-w-4xl mx-auto px-6 pt-32 py-12 flex flex-col items-center">
        <div class="w-full max-w-md flex flex-col gap-6">

            <!-- CARD 1 : GAMBAR ENTRY -->
            <section onclick="toggleCard(this)" data-target="dzikir-main" class="transition duration-500 hover:shadow-xl hover:scale-105
                bg-gradient-to-br from-[#FEF9C3] via-[#D9F99D] to-[#A7F3D0]
                rounded-3xl p-6 md:p-8 shadow-lg border-4 border-[#0F9D58]
                flex flex-col items-center text-center space-y-4 cursor-pointer">
                <img src="../assets/dzikir/Dzikir.webp" alt="Gambar Dzikir"
                    class="w-full max-w-sm aspect-square object-cover rounded-xl" />
                <p class="text-xl md:text-2xl font-['Poppins'] font-medium text-green-900">
                    Klik untuk <strong>Hitung Dzikir</strong>
                </p>
            </section>


            <!-- CARD 2 : COUNTER DZIKIR -->
            <section id="dzikir-main" class="hidden transition duration-500
                bg-gradient-to-br from-[#FEF9C3] via-[#D9F99D] to-[#A7F3D0]
                rounded-3xl p-5 sm:p-6 md:p-8 shadow-lg border-4 border-[#0F9D58] w-full">

                <!-- CARD HEADER -->
                <div class="mb-6 flex items-start justify-between">
                    <div>
                        <h2 class="text-xl sm:text-2xl font-bold text-[#0F9D58] font-['poppins']">
                            HITUNG DZIKIR
                        </h2>
                        <div class="w-16 h-1 bg-[#0F9D58] rounded-full mt-2"></div>
                    </div>
                    <button onclick="toggleBack('dzikir-main')" class="px-4 py-2 bg-[#0F9D58] text-white font-['Poppins'] text-sm rounded-lg
                        hover:opacity-90 transition whitespace-nowrap btn-kembali-green">
                        KEMBALI
                    </button>
                </div>

                <!-- SELECT -->
                <div class="mb-4">
                    <label
                        class="text-xs sm:text-sm font-semibold font-['Poppins'] text-neutral-600 uppercase tracking-widest">
                        Pilih Dzikir
                    </label>
                    <div class="relative w-full my-1">
                        <select id="zikirSelect" class="appearance-none w-full h-12 rounded-xl border border-[#0F9D58] bg-white px-5 pr-12
                            font-['Poppins'] text-sm text-neutral-700 focus:outline-none focus:ring-1 focus:ring-[#0F9D58]
                            transition-all duration-200 cursor-pointer" onchange="zikirChange()">
                            <option value="سُبْحَانَ ٱللَّٰهِ|33|Maha Suci Allah">Subhanallah (33x)</option>
                            <option value="ٱلْحَمْدُ لِلَّٰهِ|33|Segala Puji Bagi Allah">Alhamdulillah (33x)</option>
                            <option value="ٱللَّٰهُ أَكْبَرُ|33|Allah Maha Besar">Allahu Akbar (33x)</option>
                            <option value="لَا إِلَٰهَ إِلَّا ٱللَّٰهُ|100|Tiada Tuhan Selain Allah">Lailahaillallah
                                (100x)</option>
                            <option value="أَسْتَغْفِرُ ٱللَّٰهَ|70|Aku Memohon Ampun kepada Allah">Astaghfirullah (70x)
                            </option>
                        </select>
                        <div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2">
                            <svg class="h-3.5 w-3.5" viewBox="0 0 10 6" fill="#0F9D58">
                                <polygon points="0,0 10,0 5,6" />
                            </svg>
                        </div>
                    </div>

                    <!-- ARABIC + TARGET GABUNGAN -->
                    <div
                        class="w-full mt-3 mb-5 bg-white rounded-xl border-2 border-dashed border-[#0F9D58] overflow-hidden">
                        <div class="flex flex-col items-center gap-1.5 pt-6 pb-5 px-6 md:pt-8 md:pb-6 md:px-8">
                            <p id="arabicText"
                                class="text-4xl sm:text-5xl font-bold text-[#0F9D58] leading-loose text-center"
                                style="font-family:'Traditional Arabic','Scheherazade New',serif;direction:rtl;">
                                سُبْحَانَ ٱللَّٰهِ
                            </p>
                            <p id="indonesianText"
                                class="text-sm sm:text-base font-['Poppins'] font-medium text-neutral-500 italic text-center">
                                Maha Suci Allah
                            </p>
                        </div>
                        <div
                            class="flex items-center justify-center gap-2 py-3 px-4 bg-white border-t border-dashed border-[#0F9D58]">
                            <span
                                class="font-['Poppins'] text-xs font-semibold text-neutral-600 uppercase tracking-widest">Target</span>
                            <span id="zikirTargetDisplay"
                                class="font-['Poppins'] text-2xl sm:text-3xl font-extrabold text-[#0F9D58] leading-none">33</span>
                            <span class="font-['Poppins'] text-sm font-bold text-[#0F9D58]">kali</span>
                        </div>
                    </div>

                    <!-- RING COUNTER -->
                    <div class="flex flex-col items-center gap-4 mb-6">
                        <div class="relative w-32 h-32 sm:w-36 sm:h-36 md:w-40 md:h-40">
                            <svg class="w-full h-full -rotate-90" viewBox="0 0 160 160">
                                <defs>
                                    <linearGradient id="zikirGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                        <stop offset="0%" stop-color="#0F9D58" />
                                        <stop offset="100%" stop-color="#84cc16" />
                                    </linearGradient>
                                </defs>
                                <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(0,0,0,0.08)"
                                    stroke-width="10" />
                                <circle id="zikirRing" cx="80" cy="80" r="68" fill="none" stroke="url(#zikirGrad)"
                                    stroke-width="10" stroke-linecap="round" stroke-dasharray="427"
                                    stroke-dashoffset="427"
                                    style="transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1)" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span id="zikirCount"
                                    class="text-3xl sm:text-4xl md:text-5xl font-bold text-[#0F9D58] leading-none font-['Poppins']">0</span>
                                <span
                                    class="font-['Poppins'] text-xs sm:text-sm uppercase tracking-widest text-neutral-500 mt-1">dzikir</span>
                            </div>
                        </div>
                        <div id="zikirBeads"
                            class="flex flex-wrap justify-center gap-1 max-w-[200px] sm:max-w-[240px] min-h-[18px]">
                        </div>
                    </div>

                    <!-- NOTIF INLINE -->
                    <div id="zikirNotif" class="hidden mb-4 text-center py-2 px-4 rounded-xl bg-white/60 border border-[#0F9D58]/40
                        font-['Poppins'] text-sm font-bold text-[#0F9D58]">
                    </div>

                    <!-- POPUP -->
                    <div id="zikirPopup" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
                        <div class="bg-white rounded-3xl p-6 w-80 text-center shadow-2xl">
                            <h2 class="text-xl font-bold font-['Poppins'] text-[#0F9D58] mb-3">Notifikasi!</h2>
                            <p id="zikirPopupText" class="mb-5 font-['Poppins'] text-gray-600"></p>
                            <button onclick="zikirClosePopup()" class="px-6 py-2 bg-[#0F9D58] text-white font-['Poppins'] rounded-xl
                                hover:brightness-110 active:scale-95 transition">Tutup</button>
                        </div>
                    </div>

                    <!-- SOUND -->
                    <audio id="zikirSound">
                        <source src="../assets/dzikir/Sound.mp3" type="audio/ogg">
                    </audio>

                    <!-- BUTTONS 50:50 -->
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="zikirAdd()" id="btnZikirAdd" class="btn-3d-green w-full py-4 sm:py-5 bg-[linear-gradient(180deg,#0F9D58_0%,#0a7a44_100%)] text-white
                            font-['Poppins'] rounded-2xl flex flex-col justify-center items-center gap-0.5">
                            <span class="text-3xl sm:text-4xl font-bold leading-none">+</span>
                            <span class="text-xs sm:text-sm font-semibold tracking-widest uppercase">Tambah</span>
                        </button>
                        <button onclick="zikirReset()" class="btn-3d-white w-full py-4 sm:py-5 bg-[linear-gradient(180deg,#FF8C2A_0%,#E06010_100%)] border-1 border-[#0F9D58]/40
                            text-white text-base sm:text-lg font-['Poppins'] font-semibold rounded-2xl">
                            ↺ RESET
                        </button>
                    </div>
                </div>
            </section>



        </div>
    </main>

    <!-- FOOTER -->
    <site-footer quote="Ingatlah, hanya dengan mengingat Allah hati menjadi tenteram." source="QS. Ar-Ra'd: 28">
    </site-footer>

    <!-- JS -->
    <script src="../js/dzikir.js"></script>

</body>

</html>
